version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: flashtix-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - flashtix

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: flashtix-backend
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - flashtix
    restart: unless-stopped

networks:
  flashtix:
    driver: bridge
